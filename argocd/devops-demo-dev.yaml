apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: devops-demo-dev
  namespace: argocd
spec:
  project: default
  source:
    repoURL: https://github.com/xputraade/devops-demo-gitops.git
    targetRevision: main
    path: charts/devops-demo
    helm:
      valueFiles:
        - ../../apps/devops-demo/dev/values.yaml
  destination:
    server: https://kubernetes.default.svc
    namespace: devops-demo
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
